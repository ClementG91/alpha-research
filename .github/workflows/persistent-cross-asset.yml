name: Persistent factor-neutral cross-asset research

on:
  pull_request:
    branches: [main]
    paths:
      - "cross_asset_research.py"
      - "cross_asset_research_v2.py"
      - "cross_asset_research_v3.py"
      - "cross_asset_momentum.py"
      - "cross_asset_persistent.py"
      - "requirements-cross-asset.txt"
      - "tests/test_cross_asset_persistent.py"
      - ".github/workflows/persistent-cross-asset.yml"
  workflow_dispatch:
  schedule:
    - cron: "29 4 * * 0"

permissions:
  contents: read

concurrency:
  group: persistent-cross-asset-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-cross-asset.txt
      - run: python -m pip install --upgrade pip && pip install -r requirements-cross-asset.txt
      - run: ruff check --select E9,F cross_asset_persistent.py tests/test_cross_asset_persistent.py
      - run: python -m compileall -q cross_asset_persistent.py tests/test_cross_asset_persistent.py
      - run: pytest -q tests/test_cross_asset_persistent.py
        env:
          PYTHONPATH: "."

  research:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-cross-asset.txt
      - run: python -m pip install --upgrade pip && pip install -r requirements-cross-asset.txt
      - uses: actions/cache@v4
        with:
          path: data/cache/stooq
          key: market-daily-v2-${{ runner.os }}
      - name: Run turnover-aware persistent research
        env:
          LSE_API_KEY: ${{ secrets.LSE_API_KEY }}
        run: |
          rm -rf results/persistent
          set +e
          python cross_asset_persistent.py --output results/persistent --cost-bps 5
          code=$?
          set -e
          if [ "$code" -eq 1 ]; then
            exit 1
          fi
      - name: Print report or fatal diagnostics
        if: always()
        run: |
          test ! -f results/persistent/REPORT.md || cat results/persistent/REPORT.md
          test ! -f results/persistent/FATAL.txt || cat results/persistent/FATAL.txt
      - name: Upload full persistent-research artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: persistent-cross-asset-${{ github.run_number }}
          path: results/persistent/
          if-no-files-found: warn
          retention-days: 90
