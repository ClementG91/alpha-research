name: Manifold research CI

on:
  pull_request:
    branches: [main]
    paths:
      - "manifold_research.py"
      - "run_manifold_research.py"
      - "run_beta_neutral_mean_reversion.py"
      - "run_walk_forward_mean_reversion.py"
      - "run_paper_monitor.py"
      - "tests/**"
      - "requirements-*.txt"
      - ".github/workflows/**"
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - run: python -m pip install --upgrade pip && pip install -r requirements-dev.txt
      - run: ruff check --select E9,F manifold_research.py run_manifold_research.py run_beta_neutral_mean_reversion.py run_walk_forward_mean_reversion.py run_paper_monitor.py tests
      - run: python -m compileall -q manifold_research.py run_manifold_research.py run_beta_neutral_mean_reversion.py run_walk_forward_mean_reversion.py run_paper_monitor.py tests
      - run: pytest -q
        env:
          PYTHONPATH: "."
