name: ManifoldBT GARCH probe

on:
  pull_request:
    branches: [main]
    paths:
      - "run_garch_probe.py"
      - ".github/workflows/garch-probe.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-manifold.txt

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements-manifold.txt

      - name: Run controlled GARCH variants
        env:
          MANIFOLDBT_MCP_URL: https://mcp.manifoldbt.com/mcp
        run: |
          rm -rf results/garch_probe
          python run_garch_probe.py

      - name: Print probe report
        if: always()
        run: |
          test ! -f results/garch_probe/REPORT.md || cat results/garch_probe/REPORT.md
          test ! -f results/garch_probe/FATAL.txt || cat results/garch_probe/FATAL.txt

      - name: Upload probe artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: manifold-garch-probe-${{ github.run_number }}
          path: results/garch_probe/
          if-no-files-found: warn
          retention-days: 14
