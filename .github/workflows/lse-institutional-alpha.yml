name: LSE institutional alpha campaign

on:
  workflow_dispatch:
    inputs:
      phase:
        description: Campaign phase
        required: true
        default: full
        type: choice
        options:
          - discover
          - collect
          - research
          - full

permissions:
  contents: read

concurrency:
  group: lse-institutional-alpha
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-institutional.txt
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements-institutional.txt pytest ruff
      - run: ruff check --select E9,F institutional_alpha.py lse_vault.py lse_institutional_campaign.py quant_validation.py tests/test_institutional_alpha.py tests/test_lse_vault.py tests/test_quant_validation.py
      - run: python -m compileall -q institutional_alpha.py lse_vault.py lse_institutional_campaign.py quant_validation.py tests
      - run: pytest -q tests/test_institutional_alpha.py tests/test_lse_vault.py tests/test_quant_validation.py
        env:
          PYTHONPATH: "."

  authenticated-research:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    env:
      LSE_API_KEY: ${{ secrets.LSE_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - name: Require and mask the repository secret
        shell: bash
        run: |
          if [ -z "$LSE_API_KEY" ]; then
            echo "::error::Missing repository secret LSE_API_KEY"
            exit 1
          fi
          echo "::add-mask::$LSE_API_KEY"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-institutional.txt
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements-institutional.txt
      - name: Run strict LSE-only campaign
        run: |
          rm -rf results/lse_institutional
          python lse_institutional_campaign.py \
            --phase "${{ inputs.phase }}" \
            --start 2004-01-01 \
            --output results/lse_institutional
      - name: Reject any secret material in outputs
        run: |
          python - <<'PY'
          from pathlib import Path
          from lse_vault import assert_secret_absent
          assert_secret_absent(Path("results/lse_institutional"))
          PY
      - name: Upload sanitized research outputs
        uses: actions/upload-artifact@v4
        with:
          name: lse-institutional-alpha-${{ github.run_number }}
          path: results/lse_institutional/
          if-no-files-found: error
          retention-days: 30
