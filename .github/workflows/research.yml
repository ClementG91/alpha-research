name: ManifoldBT MCP research

on:
  pull_request:
    branches: [main]
    paths:
      - "manifold_research.py"
      - "run_manifold_research.py"
      - "requirements-manifold.txt"
      - ".github/workflows/research.yml"
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 0"

permissions:
  contents: write

concurrency:
  group: manifold-mcp-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-manifold.txt

      - name: Install MCP research dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements-manifold.txt

      - name: Run research entirely through ManifoldBT MCP
        env:
          MANIFOLDBT_MCP_URL: https://mcp.manifoldbt.com/mcp
        run: |
          rm -rf results/manifold
          python run_manifold_research.py --output results/manifold

      - name: Publish report and plots to the branch
        if: success()
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ] && [ "${{ github.event.pull_request.head.repo.full_name }}" != "${{ github.repository }}" ]; then
            echo "Fork PR: results remain available as an artifact because the token is read-only."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add results/manifold
          if git diff --cached --quiet; then
            echo "No result changes"
            exit 0
          fi
          git commit -m "record ManifoldBT MCP research outputs [skip ci]"
          git push origin HEAD:${{ github.head_ref || github.ref_name }}

      - name: Upload raw MCP payloads and SVG plots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: manifold-mcp-research-${{ github.run_number }}
          path: results/manifold/
          if-no-files-found: warn
          retention-days: 30
