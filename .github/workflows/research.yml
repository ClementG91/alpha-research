name: Crypto alpha research

on:
  push:
    branches: [main]
    paths-ignore:
      - "results/**"
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: alpha-research-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Syntax check
        run: python -m py_compile campaign.py generation7.py verify_candidate.py

      - name: Verify selected volatility candidate
        run: |
          rm -rf results
          mkdir -p results
          python verify_candidate.py

      - name: Print verification summary
        if: always()
        run: |
          if [ -f results/VERIFIED_CANDIDATE.md ]; then
            cat results/VERIFIED_CANDIDATE.md
          fi
          if [ -f results/FATAL.txt ]; then
            cat results/FATAL.txt
          fi

      - name: Persist research results on main
        if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add results/
          if ! git diff --cached --quiet; then
            git commit -m "record crypto alpha research results"
            git push
          fi

      - name: Upload raw research artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: alpha-research-results
          path: results/
          if-no-files-found: warn
          retention-days: 30
