name: Multi-asset quant research

on:
  pull_request:
    branches: [main]
    paths:
      - "quant_research/**"
      - "run_quant_research.py"
      - "run_advanced_quant_research.py"
      - "run_advanced_quant_research_v2.py"
      - "requirements-quant.txt"
  workflow_dispatch:
    inputs:
      monte_carlo_paths:
        description: Block-bootstrap paths
        required: false
        default: "5000"
      permutation_trials:
        description: Cross-sectional permutation trials
        required: false
        default: "1000"
  schedule:
    - cron: "17 3 * * 0"

permissions:
  contents: read

concurrency:
  group: multi-asset-quant-research
  cancel-in-progress: true

jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-quant.txt

      - name: Install quant dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements-quant.txt

      - name: Compile research engine
        run: |
          python -m compileall -q \
            quant_research \
            run_quant_research.py \
            run_advanced_quant_research.py \
            run_advanced_quant_research_v2.py

      - name: Run corrected maximum-history quant ensemble
        env:
          PYTHONHASHSEED: "0"
          MC_PATHS: ${{ inputs.monte_carlo_paths || '5000' }}
          PERMUTATION_TRIALS: ${{ inputs.permutation_trials || '1000' }}
        run: |
          rm -rf results/advanced_quant
          python run_advanced_quant_research_v2.py \
            --output results/advanced_quant \
            --mc-paths "$MC_PATHS" \
            --permutation-trials "$PERMUTATION_TRIALS" \
            --holdout-months 36

      - name: Print report
        if: always()
        run: |
          test ! -f results/advanced_quant/REPORT.md || cat results/advanced_quant/REPORT.md
          test ! -f results/FATAL.txt || cat results/FATAL.txt

      - name: Upload complete research bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: advanced-multi-asset-quant-${{ github.run_number }}
          path: |
            results/advanced_quant/
            results/FATAL.txt
          if-no-files-found: warn
          retention-days: 30
