name: ManifoldBT walk-forward research

on:
  pull_request:
    branches: [main]
    paths:
      - "manifold_research.py"
      - "run_walk_forward_mean_reversion.py"
      - "run_walk_forward_mean_reversion_v2.py"
      - "run_walk_forward_mean_reversion_v3.py"
      - "requirements-manifold.txt"
      - ".github/workflows/research.yml"
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 0"

permissions:
  contents: read

concurrency:
  group: manifold-walk-forward-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-manifold.txt

      - name: Install MCP research dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements-manifold.txt

      - name: Run conditional-volatility walk-forward research
        env:
          MANIFOLDBT_MCP_URL: https://mcp.manifoldbt.com/mcp
        run: |
          rm -rf results/walk_forward
          python run_walk_forward_mean_reversion_v3.py --output results/walk_forward

      - name: Print research report or fatal error
        if: always()
        run: |
          test ! -f results/walk_forward/REPORT.md || cat results/walk_forward/REPORT.md
          test ! -f results/walk_forward/FATAL.txt || cat results/walk_forward/FATAL.txt

      - name: Upload locked strategy, raw MCP payloads and plots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: manifold-walk-forward-${{ github.run_number }}
          path: results/walk_forward/
          if-no-files-found: warn
          retention-days: 30
