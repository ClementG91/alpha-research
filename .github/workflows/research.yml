name: ManifoldBT MCP research

on:
  pull_request:
    branches: [main]
    paths:
      - "manifold_research.py"
      - "run_manifold_research.py"
      - "run_market_neutral_research.py"
      - "run_symbolref_research.py"
      - "requirements-manifold.txt"
      - ".github/workflows/research.yml"
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 0"

permissions:
  contents: read

concurrency:
  group: manifold-mcp-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-manifold.txt

      - name: Install MCP research dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements-manifold.txt

      - name: Run market-neutral mean-reversion research through ManifoldBT MCP
        env:
          MANIFOLDBT_MCP_URL: https://mcp.manifoldbt.com/mcp
        run: |
          rm -rf results/manifold
          python run_symbolref_research.py --output results/manifold

      - name: Print Manifold report or fatal error
        if: always()
        run: |
          test ! -f results/manifold/REPORT.md || cat results/manifold/REPORT.md
          test ! -f results/manifold/FATAL.txt || cat results/manifold/FATAL.txt
          test ! -f results/manifold/call-errors.jsonl || cat results/manifold/call-errors.jsonl

      - name: Upload raw MCP payloads and SVG plots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: manifold-mean-reversion-${{ github.run_number }}
          path: results/manifold/
          if-no-files-found: warn
          retention-days: 30
