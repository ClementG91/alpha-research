name: Causal alpha hunt

on:
  push:
    branches: [main]
    paths:
      - "alpha_hunt.py"
      - "tests/test_alpha_hunt.py"
      - "quant_validation.py"
      - "cross_asset_*.py"
      - "requirements-*.txt"
      - "ruff.toml"
      - ".github/workflows/alpha-hunt.yml"
  workflow_dispatch:
  schedule:
    - cron: "17 5 * * 1"

permissions:
  contents: read

concurrency:
  group: causal-alpha-hunt
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements-dev.txt
      - run: ruff check --select E9,F alpha_hunt.py tests/test_alpha_hunt.py
      - run: python -m compileall -q alpha_hunt.py tests/test_alpha_hunt.py
      - run: pytest -q tests/test_alpha_hunt.py
        env:
          PYTHONPATH: "."

  research:
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 240
    env:
      LSE_API_KEY: ${{ secrets.LSE_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements-dev.txt
      - uses: actions/cache@v4
        with:
          path: data/cache/alpha_hunt
          key: alpha-hunt-market-data-v1-${{ runner.os }}
      - name: Run predeclared alpha campaign
        run: |
          rm -rf results/alpha_hunt
          python alpha_hunt.py \
            --prefer-lse \
            --start 2006-01-01 \
            --output results/alpha_hunt
      - name: Print final report
        if: always()
        run: |
          test ! -f results/alpha_hunt/REPORT.md || cat results/alpha_hunt/REPORT.md
          test ! -f results/alpha_hunt/FATAL.txt || cat results/alpha_hunt/FATAL.txt
      - name: Upload research artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: causal-alpha-hunt-${{ github.run_number }}
          path: results/alpha_hunt/
          if-no-files-found: error
          retention-days: 90
