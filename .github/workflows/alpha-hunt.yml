name: Causal alpha hunt

on:
  push:
    branches: [main]
    paths:
      - "alpha_hunt.py"
      - "alpha_hunt_runner.py"
      - "tests/test_alpha_hunt.py"
      - "quant_validation.py"
      - "cross_asset_*.py"
      - "requirements-*.txt"
      - "ruff.toml"
      - ".github/workflows/alpha-hunt.yml"
  workflow_dispatch:
  schedule:
    - cron: "17 5 * * 1"

permissions:
  contents: write

concurrency:
  group: causal-alpha-hunt
  cancel-in-progress: true

jobs:
  campaign:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    env:
      LSE_API_KEY: ${{ secrets.LSE_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements-dev.txt
      - uses: actions/cache@v4
        with:
          path: data/cache/alpha_hunt
          key: alpha-hunt-market-data-v1-${{ runner.os }}
      - name: Prepare diagnostics
        run: mkdir -p /tmp/alpha_hunt
      - id: lint
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          ruff check --select E9,F alpha_hunt.py alpha_hunt_runner.py tests/test_alpha_hunt.py 2>&1 | tee /tmp/alpha_hunt/ruff.log
      - id: compile
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          python -m compileall -q alpha_hunt.py alpha_hunt_runner.py tests/test_alpha_hunt.py 2>&1 | tee /tmp/alpha_hunt/compile.log
      - id: tests
        continue-on-error: true
        shell: bash
        env:
          PYTHONPATH: "."
        run: |
          set -o pipefail
          pytest -q tests/test_alpha_hunt.py 2>&1 | tee /tmp/alpha_hunt/pytest.log
      - name: Record failed quality gates
        if: steps.lint.outcome != 'success' || steps.compile.outcome != 'success' || steps.tests.outcome != 'success'
        run: |
          cat > /tmp/alpha_hunt/FATAL.txt <<TXT
          Alpha campaign did not run because a code-quality gate failed.
          Ruff: ${{ steps.lint.outcome }}
          Compile: ${{ steps.compile.outcome }}
          Pytest: ${{ steps.tests.outcome }}
          TXT
      - name: Run predeclared alpha campaign
        if: steps.lint.outcome == 'success' && steps.compile.outcome == 'success' && steps.tests.outcome == 'success'
        continue-on-error: true
        run: |
          rm -rf /tmp/alpha_hunt/research
          python alpha_hunt_runner.py \
            --prefer-lse \
            --start 2006-01-01 \
            --output /tmp/alpha_hunt/research
          cp -a /tmp/alpha_hunt/research/. /tmp/alpha_hunt/
      - name: Print final report
        if: always()
        run: |
          test ! -f /tmp/alpha_hunt/REPORT.md || cat /tmp/alpha_hunt/REPORT.md
          test ! -f /tmp/alpha_hunt/FATAL.txt || cat /tmp/alpha_hunt/FATAL.txt
      - name: Publish sanitized verdict to main
        if: always()
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          from lse_vault import assert_secret_absent, redact

          source = Path('/tmp/alpha_hunt')
          target = Path('results/alpha_hunt/latest')
          target.mkdir(parents=True, exist_ok=True)
          for path in sorted(target.rglob('*'), reverse=True):
              if path.is_file():
                  path.unlink()
          allowed = {
              'REPORT.md', 'summary.json', 'selected_returns.csv',
              'core_candidate_returns.csv', 'external_candidate_returns.csv',
              'ruff.log', 'compile.log', 'pytest.log',
          }
          for name in allowed:
              candidate = source / name
              if candidate.exists():
                  content = candidate.read_text(encoding='utf-8', errors='replace')
                  (target / name).write_text(redact(content), encoding='utf-8')
          plots = source / 'plots'
          if plots.exists():
              for plot in plots.iterdir():
                  if plot.suffix in {'.svg', '.png'}:
                      destination = target / 'plots' / plot.name
                      destination.parent.mkdir(parents=True, exist_ok=True)
                      destination.write_bytes(plot.read_bytes())
          fatal = source / 'FATAL.txt'
          if fatal.exists():
              (target / 'FATAL.txt').write_text(
                  redact(fatal.read_text(encoding='utf-8')), encoding='utf-8'
              )
          if not any(path.is_file() for path in target.rglob('*')):
              (target / 'FATAL.txt').write_text(
                  'Alpha campaign produced no publishable result.\n', encoding='utf-8'
              )
          assert_secret_absent(target)
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add results/alpha_hunt/latest
          if git diff --cached --quiet; then
            echo "No result change to commit"
          else
            git commit -m "publish latest alpha hunt verdict [skip ci]"
            git push origin HEAD:main
          fi
      - name: Upload research artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: causal-alpha-hunt-${{ github.run_number }}
          path: /tmp/alpha_hunt/
          if-no-files-found: error
          retention-days: 90
