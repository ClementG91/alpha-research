<svg xmlns="http://www.w3.org/2000/svg" width="960" height="500" viewBox="0 0 960 500" role="img" aria-labelledby="title desc">
  <title id="title">External Sharpe ratios by cross-asset experiment</title>
  <desc id="desc">Mean reversion minus 4.765, daily momentum minus 4.121, persistent residual trend minus 0.283, fixed ensemble minus 0.204, and the trend sleeve plus 0.689.</desc>
  <rect width="960" height="500" fill="#ffffff"/>
  <text x="40" y="45" font-family="Arial, sans-serif" font-size="25" font-weight="700" fill="#111827">External replication Sharpe</text>
  <text x="40" y="72" font-family="Arial, sans-serif" font-size="14" fill="#4b5563">All values include the stated transaction-cost model. Zero is the vertical reference line.</text>
  <line x1="560" y1="95" x2="560" y2="440" stroke="#111827" stroke-width="2"/>
  <g font-family="Arial, sans-serif" font-size="14" fill="#374151">
    <text x="40" y="137">Daily mean reversion</text>
    <text x="40" y="207">Daily momentum</text>
    <text x="40" y="277">Persistent residual trend</text>
    <text x="40" y="347">Fixed ensemble</text>
    <text x="40" y="417">Trend sleeve only</text>
  </g>
  <g>
    <rect x="226.45" y="110" width="333.55" height="36" rx="4" fill="#b91c1c"/>
    <rect x="271.53" y="180" width="288.47" height="36" rx="4" fill="#b91c1c"/>
    <rect x="540.19" y="250" width="19.81" height="36" rx="4" fill="#dc2626"/>
    <rect x="545.72" y="320" width="14.28" height="36" rx="4" fill="#dc2626"/>
    <rect x="560" y="390" width="48.23" height="36" rx="4" fill="#15803d"/>
  </g>
  <g font-family="Arial, sans-serif" font-size="15" font-weight="700">
    <text x="215" y="134" text-anchor="end" fill="#991b1b">−4.765</text>
    <text x="260" y="204" text-anchor="end" fill="#991b1b">−4.121</text>
    <text x="529" y="274" text-anchor="end" fill="#991b1b">−0.283</text>
    <text x="535" y="344" text-anchor="end" fill="#991b1b">−0.204</text>
    <text x="619" y="414" fill="#166534">+0.689</text>
  </g>
  <g font-family="Arial, sans-serif" font-size="12" fill="#6b7280">
    <text x="210" y="465" text-anchor="middle">−5</text>
    <text x="350" y="465" text-anchor="middle">−3</text>
    <text x="490" y="465" text-anchor="middle">−1</text>
    <text x="560" y="465" text-anchor="middle">0</text>
    <text x="630" y="465" text-anchor="middle">+1</text>
  </g>
</svg>
