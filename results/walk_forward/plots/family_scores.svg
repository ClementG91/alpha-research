<svg xmlns="http://www.w3.org/2000/svg" width="900" height="430" viewBox="0 0 900 430" role="img" aria-labelledby="title desc">
  <title id="title">Multi-fold family selection scores</title>
  <desc id="desc">Dual GARCH exhaustion scored 0.317, GARCH KAMA fade scored minus 0.009, and GARCH shock fade scored minus 0.842.</desc>
  <rect width="900" height="430" fill="white"/>
  <g font-family="Arial, sans-serif" fill="#111">
    <text x="450" y="34" text-anchor="middle" font-size="22" font-weight="700">Multi-fold family selection score</text>
    <text x="450" y="58" text-anchor="middle" font-size="13" fill="#555">Rewards unseen Sharpe and alpha; penalises beta, drift and bad folds</text>
    <line x1="480" y1="90" x2="480" y2="370" stroke="#222"/>
    <text x="80" y="135" font-size="15">dual_garch_exhaustion</text>
    <rect x="480" y="110" width="190" height="38" rx="4" fill="#444"/>
    <text x="680" y="135" font-size="14">0.317</text>
    <text x="80" y="225" font-size="15">garch_kama_fade</text>
    <rect x="475" y="200" width="5" height="38" rx="2" fill="#999"/>
    <text x="445" y="225" text-anchor="end" font-size="14">−0.009</text>
    <text x="80" y="315" font-size="15">garch_shock_fade</text>
    <rect x="100" y="290" width="380" height="38" rx="4" fill="#aaa"/>
    <text x="90" y="315" text-anchor="end" font-size="14">−0.842</text>
    <text x="480" y="398" text-anchor="middle" font-size="12" fill="#555">0</text>
  </g>
</svg>
