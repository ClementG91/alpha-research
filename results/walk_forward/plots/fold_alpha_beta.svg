<svg xmlns="http://www.w3.org/2000/svg" width="900" height="460" viewBox="0 0 900 460" role="img" aria-labelledby="title desc">
  <title id="title">Walk-forward alpha and beta</title>
  <desc id="desc">Alpha was positive in 2022 and 2023, negative in 2024. Beta remained close to zero in every fold.</desc>
  <rect width="900" height="460" fill="white"/>
  <g font-family="Arial, sans-serif" fill="#111">
    <text x="450" y="34" text-anchor="middle" font-size="22" font-weight="700">Walk-forward alpha and beta</text>
    <text x="450" y="58" text-anchor="middle" font-size="13" fill="#555">Low beta was stable; alpha changed sign in 2024</text>
    <line x1="90" y1="260" x2="850" y2="260" stroke="#222"/>
    <line x1="90" y1="90" x2="90" y2="390" stroke="#222"/>
    <rect x="160" y="246" width="55" height="14" fill="#333"/><rect x="220" y="260" width="55" height="25" fill="#aaa"/>
    <rect x="370" y="92" width="55" height="168" fill="#333"/><rect x="430" y="260" width="55" height="36" fill="#aaa"/>
    <rect x="580" y="260" width="55" height="47" fill="#333"/><rect x="640" y="260" width="55" height="9" fill="#aaa"/>
    <text x="188" y="238" text-anchor="middle" font-size="12">α 0.0031</text><text x="248" y="302" text-anchor="middle" font-size="12">β −0.0055</text>
    <text x="398" y="84" text-anchor="middle" font-size="12">α 0.0390</text><text x="458" y="313" text-anchor="middle" font-size="12">β −0.0084</text>
    <text x="608" y="326" text-anchor="middle" font-size="12">α −0.0109</text><text x="668" y="286" text-anchor="middle" font-size="12">β −0.0021</text>
    <text x="220" y="420" text-anchor="middle" font-size="15">2022</text><text x="430" y="420" text-anchor="middle" font-size="15">2023</text><text x="640" y="420" text-anchor="middle" font-size="15">2024</text>
    <rect x="690" y="92" width="18" height="12" fill="#333"/><text x="715" y="103" font-size="12">Alpha</text>
    <rect x="770" y="92" width="18" height="12" fill="#aaa"/><text x="795" y="103" font-size="12">Beta</text>
  </g>
</svg>
