<svg xmlns="http://www.w3.org/2000/svg" width="900" height="460" viewBox="0 0 900 460" role="img" aria-labelledby="title desc">
  <title id="title">Walk-forward Sharpe by unseen year</title>
  <desc id="desc">Sharpe ratios: 0.165 in 2022, 0.985 in 2023, and minus 0.527 in 2024. Target is 1.5.</desc>
  <rect width="900" height="460" fill="white"/>
  <g font-family="Arial, sans-serif" fill="#111">
    <text x="450" y="34" text-anchor="middle" font-size="22" font-weight="700">Walk-forward Sharpe by unseen year</text>
    <text x="450" y="58" text-anchor="middle" font-size="13" fill="#555">Each bar is a calendar year not used to fit that fold</text>
    <line x1="90" y1="370" x2="850" y2="370" stroke="#222"/>
    <line x1="90" y1="90" x2="90" y2="370" stroke="#222"/>
    <line x1="90" y1="160" x2="850" y2="160" stroke="#777" stroke-dasharray="6 5"/>
    <text x="845" y="153" text-anchor="end" font-size="12" fill="#555">target 1.5</text>
    <line x1="90" y1="300" x2="850" y2="300" stroke="#bbb"/>
    <text x="78" y="304" text-anchor="end" font-size="12">0</text>
    <rect x="175" y="277" width="130" height="23" rx="4" fill="#666"/>
    <rect x="385" y="162" width="130" height="138" rx="4" fill="#333"/>
    <rect x="595" y="300" width="130" height="74" rx="4" fill="#999"/>
    <text x="240" y="268" text-anchor="middle" font-size="15">0.165</text>
    <text x="450" y="153" text-anchor="middle" font-size="15">0.985</text>
    <text x="660" y="395" text-anchor="middle" font-size="15">−0.527</text>
    <text x="240" y="425" text-anchor="middle" font-size="15">2022</text>
    <text x="450" y="425" text-anchor="middle" font-size="15">2023</text>
    <text x="660" y="425" text-anchor="middle" font-size="15">2024</text>
  </g>
</svg>
